# Logstash configuration for JobSpy

input {
  # Nginx access logs
  file {
    path => "/var/log/nginx/access.log"
    start_position => "beginning"
    tags => ["nginx", "access"]
    codec => multiline {
      pattern => "^%{HTTPDATE}"
      negate => true
      what => "previous"
    }
  }

  # Nginx error logs
  file {
    path => "/var/log/nginx/error.log"
    start_position => "beginning"
    tags => ["nginx", "error"]
  }

  # Application logs (JSON format)
  file {
    path => "/var/log/app/*.log"
    start_position => "beginning"
    tags => ["app"]
    codec => json
  }

  # Docker container logs
  file {
    path => "/var/lib/docker/containers/*/*.log"
    start_position => "beginning"
    tags => ["docker"]
    codec => json {
      charset => "UTF-8"
    }
  }

  # Syslog
  syslog {
    port => 514
    tags => ["syslog"]
  }

  # TCP input for application logs
  tcp {
    port => 5000
    codec => json
    tags => ["tcp"]
  }

  # UDP input for application logs
  udp {
    port => 5000
    codec => json
    tags => ["udp"]
  }
}

filter {
  # Parse Nginx access logs
  if "nginx" in [tags] and "access" in [tags] {
    grok {
      match => {
        "message" => '%{IPORHOST:remote_addr} - %{DATA:remote_user} \[%{HTTPDATE:timestamp}\] "%{WORD:method} %{DATA:request} HTTP/%{NUMBER:http_version}" %{NUMBER:status} %{NUMBER:body_bytes_sent} "%{DATA:http_referer}" "%{DATA:http_user_agent}" "%{DATA:http_x_forwarded_for}" rt=%{NUMBER:request_time} uct="%{DATA:upstream_connect_time}" uht="%{DATA:upstream_header_time}" urt="%{DATA:upstream_response_time}"'
      }
    }

    date {
      match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
      target => "@timestamp"
    }

    mutate {
      convert => {
        "status" => "integer"
        "body_bytes_sent" => "integer"
        "http_version" => "float"
        "request_time" => "float"
      }
      remove_field => ["message", "timestamp"]
    }

    # Add response time metrics
    if [request_time] {
      mutate {
        add_field => { "response_time_category" => "normal" }
      }
      if [request_time] > 1 {
        mutate {
          replace => { "response_time_category" => "slow" }
        }
      }
      if [request_time] > 5 {
        mutate {
          replace => { "response_time_category" => "very_slow" }
        }
      }
    }

    # Add status category
    if [status] >= 500 {
      mutate {
        add_field => { "status_category" => "error" }
      }
    } else if [status] >= 400 {
      mutate {
        add_field => { "status_category" => "client_error" }
      }
    } else if [status] >= 300 {
      mutate {
        add_field => { "status_category" => "redirect" }
      }
    } else if [status] >= 200 {
      mutate {
        add_field => { "status_category" => "success" }
      }
    }
  }

  # Parse Nginx error logs
  if "nginx" in [tags] and "error" in [tags] {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{LOGLEVEL:severity}\] %{GREEDYDATA:error_message}"
      }
    }

    date {
      match => ["timestamp", "yyyy/MM/dd HH:mm:ss"]
      target => "@timestamp"
    }

    mutate {
      remove_field => ["message", "timestamp"]
    }
  }

  # Parse application logs (JSON)
  if "app" in [tags] {
    # Already parsed by JSON codec
    mutate {
      add_field => { "log_source" => "application" }
    }
  }

  # Parse Docker logs
  if "docker" in [tags] {
    mutate {
      rename => { "log" => "message" }
      add_field => { "log_source" => "docker" }
    }
  }

  # Add environment information
  mutate {
    add_field => {
      "environment" => "${ENVIRONMENT:production}"
      "service" => "${SERVICE_NAME:jobspy}"
      "version" => "${APP_VERSION:1.0.0}"
    }
  }

  # Add hostname
  mutate {
    add_field => { "hostname" => "%{HOSTNAME}" }
  }

  # Anonymize sensitive data
  mutate {
    gsub => [
      "message", "password=([^&\s]+)", "password=***",
      "message", "token=([^&\s]+)", "token=***",
      "message", "api_key=([^&\s]+)", "api_key=***",
      "message", "Authorization: Bearer [^\s]+", "Authorization: Bearer ***"
    ]
  }

  # Remove empty fields
  mutate {
    remove_field => ["@version"]
  }
}

output {
  # Elasticsearch output
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:elasticsearch:9200}"]
    index => "jobspy-%{+YYYY.MM.dd}"
    document_type => "_doc"
    user => "${ELASTICSEARCH_USER:elastic}"
    password => "${ELASTICSEARCH_PASSWORD:changeme}"
    ssl => true
    ssl_certificate_verification => false
  }

  # Console output for debugging (disable in production)
  if [@metadata][debug] {
    stdout {
      codec => rubydebug
    }
  }

  # File output for backup
  file {
    path => "/var/log/logstash/output-%{+YYYY.MM.dd}.log"
    codec => json
  }

  # Conditional outputs based on severity
  if [severity] == "error" or [status] >= 500 {
    # Send errors to separate index
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST:elasticsearch:9200}"]
      index => "jobspy-errors-%{+YYYY.MM.dd}"
      document_type => "_doc"
      user => "${ELASTICSEARCH_USER:elastic}"
      password => "${ELASTICSEARCH_PASSWORD:changeme}"
      ssl => true
      ssl_certificate_verification => false
    }
  }

  # Metrics output
  if [response_time_category] == "slow" or [response_time_category] == "very_slow" {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST:elasticsearch:9200}"]
      index => "jobspy-performance-%{+YYYY.MM.dd}"
      document_type => "_doc"
      user => "${ELASTICSEARCH_USER:elastic}"
      password => "${ELASTICSEARCH_PASSWORD:changeme}"
      ssl => true
      ssl_certificate_verification => false
    }
  }
}
