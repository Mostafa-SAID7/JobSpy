version: '3.8'

services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: jobspy_postgres
    environment:
      POSTGRES_USER: jobspy_user
      POSTGRES_PASSWORD: jobspy_password
      POSTGRES_DB: jobspy_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobspy_user -d jobspy_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobspy_network

  # ── Redis Cache ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jobspy_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobspy_network

  # ── FastAPI Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: jobspy_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://jobspy_user:jobspy_password@postgres:5432/jobspy_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DEBUG: "True"
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobspy_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: jobspy_celery_worker
    environment:
      DATABASE_URL: postgresql+asyncpg://jobspy_user:jobspy_password@postgres:5432/jobspy_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DEBUG: "True"
      ENVIRONMENT: development
    volumes:
      - ./Backend:/app
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - jobspy_network
    command: celery -A app.core.celery worker --loglevel=info

  # ── Celery Beat (Scheduler) ──────────────────────────────────────
  celery_beat:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: jobspy_celery_beat
    environment:
      DATABASE_URL: postgresql+asyncpg://jobspy_user:jobspy_password@postgres:5432/jobspy_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DEBUG: "True"
      ENVIRONMENT: development
    volumes:
      - ./Backend:/app
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - jobspy_network
    command: celery -A app.core.celery beat --loglevel=info

  # ── Vue.js Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: jobspy_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - jobspy_network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  jobspy_network:
    driver: bridge
