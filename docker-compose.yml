version: '3.8'

services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: jobspy_postgres
    environment:
      POSTGRES_USER: jobspy_user
      POSTGRES_PASSWORD: jobspy_password
      POSTGRES_DB: jobspy_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobspy_user -d jobspy_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobspy_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis Cache ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jobspy_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobspy_network
    restart: unless-stopped
    command: redis-server --appendonly yes
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── FastAPI Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: jobspy_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://jobspy_user:jobspy_password@postgres:5432/jobspy_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DEBUG: "False"
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY:-jobspy-secret-key-2026-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobspy_network
    restart: unless-stopped
    command: gunicorn app.main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 120
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Celery Worker ────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: jobspy_celery_worker
    environment:
      DATABASE_URL: postgresql+asyncpg://jobspy_user:jobspy_password@postgres:5432/jobspy_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DEBUG: "False"
      ENVIRONMENT: production
    volumes:
      - ./Backend:/app
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - jobspy_network
    restart: unless-stopped
    command: celery -A app.core.celery worker --loglevel=info --concurrency=4
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Celery Beat (Scheduler) ──────────────────────────────────────
  celery_beat:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: jobspy_celery_beat
    environment:
      DATABASE_URL: postgresql+asyncpg://jobspy_user:jobspy_password@postgres:5432/jobspy_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DEBUG: "False"
      ENVIRONMENT: production
    volumes:
      - ./Backend:/app
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - jobspy_network
    restart: unless-stopped
    command: celery -A app.core.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Vue.js Frontend (Nginx) ──────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: jobspy_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - jobspy_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  jobspy_network:
    driver: bridge
