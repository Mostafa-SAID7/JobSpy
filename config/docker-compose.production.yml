version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: jobspy-postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-jobspy_prod}
      POSTGRES_USER: ${DATABASE_USER:-jobspy_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-jobspy_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jobspy-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: jobspy-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jobspy-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # FastAPI Backend
  backend:
    image: ${DOCKER_REGISTRY:-docker.io}/jobspy-backend:${BACKEND_VERSION:-latest}
    container_name: jobspy-backend
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: info
      DATABASE_URL: postgresql://${DATABASE_USER:-jobspy_user}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME:-jobspy_prod}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: ${CORS_ORIGINS:-["https://yourdomain.com"]}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: production
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - jobspy-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: >
      sh -c "alembic upgrade head &&
             gunicorn app.main:app
             --workers 4
             --worker-class uvicorn.workers.UvicornWorker
             --bind 0.0.0.0:8000
             --access-logfile -
             --error-logfile -
             --log-level info"

  # Celery Worker
  celery-worker:
    image: ${DOCKER_REGISTRY:-docker.io}/jobspy-backend:${BACKEND_VERSION:-latest}
    container_name: jobspy-celery-worker
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: info
      DATABASE_URL: postgresql://${DATABASE_USER:-jobspy_user}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME:-jobspy_prod}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: production
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - ./Backend:/app
    restart: unless-stopped
    networks:
      - jobspy-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: >
      celery -A app.tasks worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=1000

  # Celery Beat (Scheduler)
  celery-beat:
    image: ${DOCKER_REGISTRY:-docker.io}/jobspy-backend:${BACKEND_VERSION:-latest}
    container_name: jobspy-celery-beat
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: info
      DATABASE_URL: postgresql://${DATABASE_USER:-jobspy_user}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME:-jobspy_prod}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: production
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - ./Backend:/app
      - celery_beat_schedule:/app/celery_beat_schedule
    restart: unless-stopped
    networks:
      - jobspy-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: >
      celery -A app.tasks beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # Vue.js Frontend (Nginx)
  frontend:
    image: ${DOCKER_REGISTRY:-docker.io}/jobspy-frontend:${FRONTEND_VERSION:-latest}
    container_name: jobspy-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-https://api.yourdomain.com}
      VITE_APP_NAME: JobSpy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/ssl:/etc/nginx/ssl:ro
      - frontend_cache:/var/cache/nginx
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - jobspy-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy (Optional, for advanced routing)
  nginx:
    image: nginx:alpine
    container_name: jobspy-nginx
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./config/nginx-proxy.conf:/etc/nginx/nginx.conf:ro
      - ./config/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - jobspy-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  celery_beat_schedule:
    driver: local
  frontend_cache:
    driver: local

networks:
  jobspy-network:
    driver: bridge
